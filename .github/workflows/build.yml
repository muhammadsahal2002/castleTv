name: Build CloudStream Extension

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        uses: gradle/gradle-build-action@v3
        with:
          arguments: build --no-daemon

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: extension-jars
          path: build/libs/*.jar

      - name: Copy JARs to builds folder
        run: |
          mkdir -p builds
          cp build/libs/*.jar builds/ || echo "No JAR found"